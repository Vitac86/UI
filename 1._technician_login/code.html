<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d33a5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101522",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<title>Technician Access - Fieldvance</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top Bar / Logo -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-primary flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">
                    precision_manufacturing
                </span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Fieldvance</h2>
</div>
<!-- Hero Branding Image -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-slate-200 dark:bg-slate-800 @[480px]:rounded-xl min-h-[240px] shadow-sm" data-alt="Technical professional working with specialized equipment" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBeZJf0HAKMCc9GoGacLJYXHK8MKjo4R5ZDVYPTdB7UgnOkSL2NMTuxwEMU4qdQGMwtrqijjQhN_e33MCBNxxq3IsXE4tEqaKWgTsxpYmS-R6vbNRnf6060cYp2zL6WxTerr9OeURtx5E7vqGO5v-a3eAHlDPPMSsESjsuHnRtMP-Pr9Gmz9cAfw8Hv4PKfyYn9rpvRXvodJaZdcOwUBF_xvMBQaQZ2dQcc3zuBPpJnPUYrgNRAYQb7jiGPpamOo23k5mlxLsgngS5k");'>
</div>
</div>
</div>
<!-- Login Header -->
<div class="px-4 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight text-center">Technician Login</h1>
<p class="text-slate-600 dark:text-slate-400 text-center mt-2 text-sm">Enter your credentials to access the field workflow</p>
</div>
<!-- Form Section -->
<div class="flex flex-col max-w-[480px] mx-auto w-full px-4 gap-2">
<!-- Workspace ID Field -->
<div class="py-2">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Workspace ID</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">domain</span>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 pl-12 pr-4 text-base font-normal leading-normal" placeholder="e.g. fieldvance-madrid" type="text"/>
</div>
</label>
</div>
<!-- Email Field -->
<div class="py-2">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Email</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 pl-12 pr-4 text-base font-normal leading-normal" placeholder="nombre@empresa.es" type="email"/>
</div>
</label>
</div>
<!-- Password Field -->
<div class="py-2">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Password</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 pl-12 pr-12 text-base font-normal leading-normal" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 mt-6">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg transition-colors flex items-center justify-center gap-2">
<span>Sign In to Fieldvance</span>
<span class="material-symbols-outlined">login</span>
</button>
<button class="w-full bg-transparent text-primary dark:text-primary/90 font-medium py-2 text-sm hover:underline decoration-2 underline-offset-4">
                    Forgot your password?
                </button>
</div>
<!-- Footer Help -->
<div class="mt-12 mb-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-xs">
                    © 2026 Fieldvance Technologies. All rights reserved.<br/>
<span class="inline-block mt-2">Technical support: support@fieldvance.com</span>
</p>
</div>
</div>
</div>
</body></html>
